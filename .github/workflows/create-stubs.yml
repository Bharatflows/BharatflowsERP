name: Create stub files
on:
  push:
    paths:
      - '.github/workflows/create-stubs.yml'
jobs:
  create-stubs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create stub files
        run: |
          echo '  ' | base64 -d > /tmp/create_stubs.py
          python3 /tmp/create_stubs.py
      - name: Commit stub files
        run: |
          git config user.name 'BharatflowsBot'
          git config user.email 'admin@bharatflows.com'
          git add -A
          git diff --staged --quiet || git commit -m 'Add 84 missing stub files for build'
          git push
